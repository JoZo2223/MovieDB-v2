<div class="container">
  <div class="sticky-wrapper">
    <div class="header">
      <app-header
        [title]="headerTitle()"
        [subtitle]="headerSubtitle()">
      </app-header>

      <app-language-switcher></app-language-switcher>

      <app-tabs
        [activeTab]="activeTab()"
        (tabChange)="setTab($event)">
      </app-tabs>
    </div>

    <app-search-field
      class="search"
      [searchTerm]="searchTerm()"
      [placeholder]="searchPlaceholder()"
      (searchTermChange)="onSearchChange($event)">
    </app-search-field>
  </div>

  <div class="results">
    <div class="results-header">
      <h2>{{ resultsTitle() }}</h2>

      @if (showResultCount()) {
        <span class="results-count">
          {{ resultCountLabel() }}
        </span>
      }
    </div>

    @if (showLoading()) {
      <app-info-message [text]="resultsLoadingLabel()" />
    }

    @if (showError()) {
      <app-info-message [text]="errorMessage()" type="error" />
    }

    @if (showResultsList()) {
      <app-results-list
        [results]="results()"
        [activeTab]="activeTab()"
        (itemSelected)="openDetails($event)">
      </app-results-list>

      @if (showLoadingMore()) {
        <app-info-message [text]="resultsLoadingMoreLabel()" />
      }

      @if (showNoMoreResults()) {
        <app-info-message [text]="resultsNoMoreLabel()" />
      }
    }

    @if (showNoResults()) {
      <app-info-message [text]="resultsNoResultsLabel()" />
    }

    <div #loadMoreTrigger class="load-more-trigger"></div>
  </div>
</div>
