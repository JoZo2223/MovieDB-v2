<div class="app-layout">
  <app-sidebar
    [activeView]="activeView()"
    (viewChange)="setView($event)">
  </app-sidebar>

  <main class="container">
    <div class="sticky-wrapper">
      <div class="header">
        <app-header
          [title]="'HEADER.TITLE' | translate"
          [subtitle]="'HEADER.SUBTITLE' | translate">
        </app-header>

        <div class="header-actions">
          <app-theme-toggle></app-theme-toggle>
          <app-language-switcher></app-language-switcher>
        </div>

        @if (activeView() === 'best') {
          <app-tabs
            [activeTab]="store.activeTab()"
            (tabChange)="setTab($event)">
          </app-tabs>
        }
      </div>

      @if (activeView() === 'best') {
        <app-search-field
          class="search"
          [searchTerm]="store.searchTerm()"
          [placeholder]="(store.activeTab() === 'movies' ? 'SEARCH.MOVIES' : 'SEARCH.SERIES') | translate"
          (searchTermChange)="onSearchChange($event)">
        </app-search-field>
      }
    </div>

    <div class="results">
      <app-results-section
        [titleKey]="activeView() === 'favorites' ? 'FAVORITES.TITLE' : (store.activeTab() === 'movies' ? 'RESULTS.MOVIES' : 'RESULTS.SERIES')"
        [resultCount]="displayedResults().length"
        [showResultCount]="activeView() === 'favorites' ? displayedResults().length > 0 : store.showResultCount()"
        [showResultsList]="activeView() === 'favorites' ? (!favorites.isLoading() && displayedResults().length > 0) : store.showResultsList()"
        [messages]="resultMessages()"
        [results]="displayedResults()"
        [activeTab]="store.activeTab()"
        [favoriteIds]="favorites.favoriteIds()"
        [favoriteLoadingIds]="favorites.loadingIds()"
        (itemSelected)="openDetails($event)"
        (favoriteToggle)="toggleFavorite($event)">
      </app-results-section>

        <div #loadMoreTrigger class="load-more-trigger"></div>
    </div>
  </main>
</div>
