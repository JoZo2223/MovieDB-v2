<div
  class="result-card"
  (click)="onClick()"
  (keydown)="onKeydown($event)"
  (mouseenter)="onHover()"
  tabindex="0"
>
  @if (posterUrl()) {
    <img [src]="posterUrl()" [alt]="title()" class="poster" />
  } @else {
    <div class="poster placeholder">{{ noImageLabel() }}</div>
  }

  <div class="overlay">
    <h3>{{ title() }}</h3>
    <p>{{ overview() }}</p>
  </div>
</div>
