<div
  class="result-card"
  (click)="onClick()"
  (keydown)="onKeydown($event)"
  (mouseenter)="onHover()"
  tabindex="0"
>
  @if (posterUrl()) {
    <img [src]="posterUrl()" [alt]="title() || ('RESULTS.UNKNOWN_TITLE' | translate)" class="poster" />
  } @else {
    <div class="poster placeholder">{{ 'RESULTS.NO_IMAGE' | translate }}</div>
  }

  <div class="overlay">
    <h3>{{ title() || ('RESULTS.UNKNOWN_TITLE' | translate) }}</h3>
    <p>{{ overview() }}</p>
  </div>
</div>
