<div class="results-header">
  <h2>{{ titleKey() | translate }}</h2>

  @if (showResultCount()) {
    <span class="results-count">
      {{ 'RESULTS.COUNT' | translate: { count: resultCount() } }}
    </span>
  }
</div>

<app-info-message [messages]="messages()"></app-info-message>

@if (showResultsList()) {
  <app-results-list
    [results]="results()"
    [activeTab]="activeTab()"
    (itemSelected)="onItemSelected($event)">
  </app-results-list>
}
