<div class="language-switcher">
  <div class="dropdown" (click)="toggleDropdown()">
    <div class="selected">
      <span class="selected-label">
        <img [src]="selectedLanguage().flag" class="flag" [alt]="selectedLanguage().label" />
        {{ selectedLanguage().label }}
      </span>
      <span class="arrow">▼</span>
    </div>

    @if (isOpen()) {
      <div class="menu">
        @for (lang of availableLanguages; track lang.code) {
          <div class="option" (click)="setLanguage(lang, $event)">
            <img [src]="lang.flag" class="flag" [alt]="lang.label" />
            {{ lang.label }}
          </div>
        }
      </div>
    }
  </div>
</div>
