<div class="dialog-container">
  <button class="close-button" type="button" (click)="close()">✕</button>

  <app-info-message
    [textKey]="'DETAILS.LOADING'"
    [isLoading]="isLoading()"
    [visible]="isLoading()">
  </app-info-message>

  <app-info-message
    [text]="errorMessage() | translate"
    [isError]="!!errorMessage()"
    [visible]="!!errorMessage()">
  </app-info-message>

  @if (!isLoading() && detail()) {
    <app-result-detail-content [detail]="detail()!" [type]="data.type"></app-result-detail-content>
  }
</div>
