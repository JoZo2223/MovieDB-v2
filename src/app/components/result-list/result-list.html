<div class="results-list">
  @for (item of items(); track trackById($index, item)) {
    <div class="result-wrapper">
      <app-result-card
        [item]="item"
        [type]="getItemType(item)"
        [isFavorite]="favoriteIds().has(getFavoriteKey(item))"
        [isFavoriteLoading]="favoriteLoadingIds().has(getFavoriteKey(item))"
        (cardClick)="onItemSelected($event)"
        (favoriteToggle)="onFavoriteToggle($event)">
      </app-result-card>
    </div>
  }
</div>
