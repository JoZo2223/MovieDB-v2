<div class="container">
  <h1>TMDB Search</h1>

  <div class="tabs">
    <button
      class="tab-button"
      [class.active]="activeTab === 'movies'"
      (click)="setTab('movies')">
      Movies
    </button>

    <button
      class="tab-button"
      [class.active]="activeTab === 'series'"
      (click)="setTab('series')">
      Series
    </button>
  </div>

  <div class="search-box">
    <input
      type="text"
      [(ngModel)]="searchTerm"
      (ngModelChange)="onSearchChange()"
      [placeholder]="'Search in ' + activeTab" />
  </div>

  <div class="results">
    <h2>{{ activeTab | titlecase }} Results</h2>

    <p *ngIf="isLoading">Loading...</p>
    <p *ngIf="errorMessage">{{ errorMessage }}</p>

    <ul *ngIf="!isLoading && results.length > 0">
      <li *ngFor="let item of results" class="result-item">
        <img
          *ngIf="item.poster_path"
          [src]="getPosterUrl(item.poster_path)"
          [alt]="getDisplayTitle(item)"
          class="poster" />

        <div class="content">
          <h3>{{ getDisplayTitle(item) }}</h3>
          <p><strong>Release date:</strong> {{ getDisplayDate(item) }}</p>
          <p><strong>Rating:</strong> {{ item.vote_average }}</p>
          <p>{{ item.overview || 'No overview available.' }}</p>
        </div>
      </li>
    </ul>

    <p *ngIf="!isLoading && !errorMessage && results.length === 0">
      No results found.
    </p>
  </div>
</div>
