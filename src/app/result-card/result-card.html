<div
  class="result-card"
  (click)="onClick()"
  (keydown)="onKeydown($event)"
  (mouseenter)="onHover()"
  tabindex="0"
>
  <img
    *ngIf="posterUrl; else placeholder"
    [src]="posterUrl"
    class="poster"
  />

  <ng-template #placeholder>
    <div class="poster placeholder">No image</div>
  </ng-template>

  <div class="overlay">
    <h3>{{ title }}</h3>
    <p>{{ overview }}</p>
  </div>
</div>
