<div class="tabs">
  <button class="tab-button" [class.active]="activeTab === 'movies'" (click)="selectTab('movies')">
    {{ 'TABS.MOVIES' | translate }}
  </button>

  <button class="tab-button" [class.active]="activeTab === 'series'" (click)="selectTab('series')">
    {{ 'TABS.SERIES' | translate }}
  </button>
</div>
